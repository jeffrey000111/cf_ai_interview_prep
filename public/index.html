<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Prep Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; height: 100vh; display: flex; flex-direction: column; }

  header {
    padding: 16px 24px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo { font-size: 20px; font-weight: 700; color: #f6821f; letter-spacing: -0.5px; }
  header .subtitle { font-size: 13px; color: #888; }
  header .reset-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid #333;
    color: #888;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }
  header .reset-btn:hover { border-color: #f6821f; color: #f6821f; }

  .setup-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 20px;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
  }
  .setup-screen h2 { font-size: 22px; font-weight: 600; color: #fff; }
  .setup-screen p { font-size: 14px; color: #888; text-align: center; line-height: 1.6; }
  .setup-screen textarea {
    width: 100%;
    min-height: 200px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    color: #e8e8e8;
    font-size: 14px;
    padding: 14px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.15s;
  }
  .setup-screen textarea:focus { border-color: #f6821f; }
  .setup-screen textarea::placeholder { color: #555; }
  .start-btn {
    background: #f6821f;
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    width: 100%;
  }
  .start-btn:hover { opacity: 0.9; }
  .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .chat-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .message { display: flex; gap: 12px; max-width: 820px; width: 100%; }
  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.assistant { align-self: flex-start; }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
  }
  .message.user .avatar { background: #2a4a7f; color: #7ab3ff; }
  .message.assistant .avatar { background: #3d2200; color: #f6821f; }
  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.65;
    max-width: calc(100% - 50px);
  }
  .message.user .bubble { background: #1e3a5f; color: #e8f0ff; border-bottom-right-radius: 3px; }
  .message.assistant .bubble { background: #1a1a1a; border: 1px solid #2a2a2a; color: #e8e8e8; border-bottom-left-radius: 3px; }
  .bubble strong { color: #fff; }
  .bubble hr { border: none; border-top: 1px solid #2a2a2a; margin: 10px 0; }

  .input-area {
    padding: 16px 24px;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    color: #e8e8e8;
    font-size: 14px;
    padding: 12px 14px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .input-area textarea:focus { border-color: #f6821f; }
  .input-area textarea::placeholder { color: #555; }
  .send-btn {
    background: #f6821f;
    border: none;
    color: white;
    width: 40px; height: 40px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    transition: opacity 0.15s;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .send-btn:hover { opacity: 0.9; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .typing { display: flex; gap: 4px; align-items: center; padding: 8px 0; }
  .typing span { width: 6px; height: 6px; background: #f6821f; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">⚡ Interview Prep</div>
    <div class="subtitle">Powered by Cloudflare Workers AI</div>
  </div>
  <button class="reset-btn" onclick="resetSession()">New Session</button>
</header>

<div class="setup-screen" id="setupScreen">
  <h2>Paste a Job Description to Get Started</h2>
  <p>I'll generate tailored interview questions and give you real-time feedback on your answers using the STAR framework.</p>
  <textarea id="jdInput" placeholder="Paste the job description here...&#10;&#10;Example: We're looking for a Software Engineering Intern with experience in distributed systems, Python, and a passion for building at scale..."></textarea>
  <button class="start-btn" id="startBtn" onclick="startSession()">Generate Interview Questions →</button>
</div>

<div class="chat-screen hidden" id="chatScreen">
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="chatInput" placeholder="Type your answer or ask a question... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
  // Markdown renderer (minimal) - using split/join to avoid regex escaping issues
  function renderMarkdown(text) {
    // Bold: **text**
    text = text.split('**').map(function(s, i) {
      return i % 2 === 1 ? '<strong>' + s + '</strong>' : s;
    }).join('');
    // Headers: lines starting with #
    text = text.split('\n').map(function(line) {
      if (line.startsWith('### ')) return '<strong>' + line.slice(4) + '</strong>';
      if (line.startsWith('## ')) return '<strong>' + line.slice(3) + '</strong>';
      if (line.startsWith('# ')) return '<strong>' + line.slice(2) + '</strong>';
      if (line === '---') return '<hr>';
      return line;
    }).join('\n');
    // Newlines
    text = text.split('\n\n').join('</p><p>');
    text = text.split('\n').join('<br>');
    return text;
  }

  function addMessage(role, content) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'You' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<p>' + renderMarkdown(content) + '</p>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function addTypingIndicator() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = '<div class="avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTypingIndicator() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function startSession() {
    const jd = document.getElementById('jdInput').value.trim();
    if (!jd) return;

    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.textContent = 'Analyzing JD and generating questions...';

    try {
      const res = await fetch('/api/init', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jd }),
      });
      const data = await res.json();

      document.getElementById('setupScreen').classList.add('hidden');
      document.getElementById('chatScreen').classList.remove('hidden');

      addMessage('assistant', data.message);

      document.getElementById('chatInput').focus();
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Generate Interview Questions →';
      alert('Something went wrong. Please try again.');
    }
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if (!message) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', message);
    addTypingIndicator();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      const data = await res.json();
      removeTypingIndicator();
      addMessage('assistant', data.reply);
    } catch (e) {
      removeTypingIndicator();
      addMessage('assistant', 'Something went wrong. Please try again.');
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  async function resetSession() {
    await fetch('/api/reset', { method: 'DELETE' });
    document.getElementById('chatScreen').classList.add('hidden');
    document.getElementById('setupScreen').classList.remove('hidden');
    document.getElementById('jdInput').value = '';
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').textContent = 'Generate Interview Questions →';
    document.getElementById('messages').innerHTML = '';
  }

  // Auto-resize textarea
  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('chatInput');
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Check if existing session
    fetch('/api/state').then(r => r.json()).then(state => {
      if (state.history && state.history.length > 0) {
        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('chatScreen').classList.remove('hidden');
        state.history.forEach(msg => {
          if (msg.role !== 'system') addMessage(msg.role, msg.content);
        });
      }
    }).catch(() => {});
  });
</script>
</body>
</html>
